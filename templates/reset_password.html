<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #5b6472;
      --bg: #f3efe6;
      --card: #fffdf8;
      --line: #ddd2bf;
      --accent: #ab3b2f;
      --shadow: 0 18px 50px rgba(54, 43, 31, 0.12);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top right, rgba(171, 59, 47, 0.13), transparent 24%),
        linear-gradient(180deg, #f7f1e7 0%, var(--bg) 100%);
    }
    .auth-card {
      width: min(100%, 480px);
      background: #221f1c;
      color: #fff7f0;
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .eyebrow {
      text-transform: uppercase;
      font-size: 14px;
      letter-spacing: 0.16em;
      color: #f6cdb5;
      font-weight: 800;
      margin-bottom: 10px;
    }
    h1, p { margin-top: 0; }
    p { color: #eadfd5; line-height: 1.6; }
    label {
      display: block;
      font-size: 0.88rem;
      margin-bottom: 5px;
      color: #f2dbcb;
    }
    .form-stack {
      display: grid;
      gap: 10px;
    }
    input {
      width: 100%;
      font: inherit;
      border-radius: 14px;
      padding: 12px 14px;
    }
    input {
      border: 1px solid var(--line);
      background: #fff;
    }
    button {
      width: 100%;
      font: inherit;
      border-radius: 14px;
      padding: 12px 14px;
      border: 0;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 700;
    }
    .auth-feedback {
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 0.92rem;
      background: #f7dfda;
      color: #7d281f;
    }
    .token-hint {
      font-size: 0.82rem;
      color: #cbb7a8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <section class="auth-card">
    <div class="eyebrow">Personal Finance AI Assistant</div>
    <h1>Reset your password</h1>
    {% if token_valid %}
      {% if error %}
        <div class="auth-feedback">{{ error }}</div>
      {% endif %}
      <p>Choose a new password for your account and confirm it below.</p>
      <form class="form-stack" method="post" action="/reset-password/{{ token }}">
        <div>
          <label for="new-password">New password</label>
          <input id="new-password" name="new_password" type="password" required>
        </div>
        <div>
          <label for="confirm-password">Confirm password</label>
          <input id="confirm-password" name="confirm_password" type="password" required>
        </div>
        <button type="submit">Update password</button>
      </form>
      <p class="token-hint">{{ token }}</p>
    {% else %}
      <div class="auth-feedback">{{ error }}</div>
      <p>Request a new reset link from the sign-in screen and try again.</p>
    {% endif %}
  </section>
</body>
</html>
